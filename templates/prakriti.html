{% extends "base.html" %}

{% block title %}Prakriti Extractor{% endblock %}

{% block styles %}
<style>
    .camera-box {
      position: relative;
      width: 480px;
      max-width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2a3260;
      background: #000;
      margin: 0 auto;
    }
    video, canvas { width: 100%; display: block; }
    canvas { display: none; }


    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .face-oval {
      width: 42%;
      aspect-ratio: 3/4;
      border: 2px dashed rgba(79,124,255,0.6);
      border-radius: 50%;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
    }
    button {
      padding: 11px 28px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    #startBtn  { background: #4f7cff; color: #fff; }
    #captureBtn { background: #c8a84b; color: #0f1117; }
    #captureBtn:disabled { opacity: 0.3; cursor: not-allowed; }

    #results {
      display: none;
      margin: 32px auto 0;
      width: 480px;
      max-width: 100%;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .chip {
      background: #1a1e2e;
      border: 1px solid #2a3260;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .chip-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      color: #556;
      margin-bottom: 5px;
    }
    .chip-value { font-size: 0.85rem; color: #e8edf8; }
</style>
{% endblock %}

{% block content %}
<div style="text-align: center; padding: 40px;">
    <h1>Prakriti Face Extractor</h1>
    <p style="color: #556;">Start camera → align face in oval → Capture</p>

    <div class="camera-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="overlay"><div class="face-oval"></div></div>
    </div>

    <div class="controls">
        <button id="startBtn" onclick="startCamera()">▶ Start Camera</button>
        <button id="captureBtn" onclick="capture()" disabled>⬤ Capture</button>
    </div>

    <div id="status">Camera inactive</div>

    <div id="results">
        <h2>Extracted Features</h2>
        <div class="grid" id="grid"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const video      = document.getElementById("video");
    const canvas     = document.getElementById("canvas");
    const captureBtn = document.getElementById("captureBtn");
    const statusEl   = document.getElementById("status");
    const resultsEl  = document.getElementById("results");
    const gridEl     = document.getElementById("grid");

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Camera API unavailable — open the app via http://localhost:5000 (not 127.0.0.1).", true);
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        captureBtn.disabled = false;
        setStatus("Camera ready — align your face and press Capture");
      } catch (err) {
        if (err.name === "NotAllowedError") {
          setStatus("Camera access denied — please allow camera permission in your browser.", true);
        } else if (err.name === "NotFoundError") {
          setStatus("No camera found on this device.", true);
        } else if (!navigator.mediaDevices) {
          setStatus("Camera API unavailable — use http://localhost:5000 (not 127.0.0.1).", true);
        } else {
          setStatus("Camera error: " + err.message, true);
        }
      }
    }

    async function capture() {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);

      const b64 = canvas.toDataURL("image/jpeg", 0.92);
      setStatus("Analyzing…");
      captureBtn.disabled = true;

      try {
        const res  = await fetch("/analyze", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ image: b64 }),
        });
        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || "Analysis failed", true);
        } else {
          showResults(data);
          setStatus("Done ✓");
        }
      } catch (e) {
        setStatus("Server error: " + e.message, true);
      }

      captureBtn.disabled = false;
    }

    function showResults(feats) {
      gridEl.innerHTML = "";
      for (const [label, value] of Object.entries(feats)) {
        gridEl.innerHTML += `
          <div class="chip">
            <div class="chip-label">${label}</div>
            <div class="chip-value">${value}</div>
          </div>`;
      }
      resultsEl.style.display = "block";
    }

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className   = isError ? "error" : "";
    }
  </script>
{% endblock %}
